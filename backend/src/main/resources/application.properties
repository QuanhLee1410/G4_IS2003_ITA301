# ============================================
# Spring Boot Application Configuration
# ============================================

# Application Info
spring.application.name=edunexus-backend
server.port=8080
server.servlet.context-path=/edunexus

# ============================================
# Database Configuration (SQL Server)
# ============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=EduNexusDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Admin@123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# Flyway Configuration (DB Migration)
# ============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================
# JWT Configuration
# ============================================
jwt.secret=edunexus-super-secret-key-min-256-bits-for-hs256-algorithm-change-in-production
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# AWS S3 Configuration
# ============================================
aws.s3.bucket-name=edunexus-videos
aws.s3.region=us-east-1
aws.s3.access-key=${AWS_ACCESS_KEY_ID:your-access-key}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:your-secret-key}
aws.s3.presigned-url-duration=3600

# ============================================
# Redis Configuration (optional)
# ============================================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8

# ============================================
# Payment Gateway Configuration
# ============================================
vnpay.api-url=https://sandbox.vnpayment.vn/paygate/api/transaction
vnpay.return-url=http://localhost:3000/payment-result
vnpay.notify-url=http://localhost:8080/edunexus/api/payments/vnpay-webhook
vnpay.tmn-code=TMNCODE
vnpay.hash-secret=HASHSECRET

sepay.api-url=https://api.sepay.vn
sepay.api-key=${SEPAY_API_KEY:your-sepay-key}
sepay.webhook-secret=${SEPAY_WEBHOOK_SECRET:your-webhook-secret}

# ============================================
# Logging Configuration
# ============================================
logging.level.root=INFO
logging.level.com.edunexus=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=logs/edunexus.log
logging.file.max-size=10MB
logging.file.max-history=10

# ============================================
# Jackson Configuration
# ============================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# ============================================
# Actuator & Monitoring
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
